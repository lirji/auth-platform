# auth-console 生产托管 + 同源反代 /admin -> auth-platform-admin (免 CORS)。
# ADMIN_URL 默认 host.docker.internal:8201(宿主机跑 admin);容器化 admin 时改成服务名。
server {
    listen 8202;
    server_name _;
    root /usr/share/nginx/html;

    # /admin/* 同源反代到 admin(透传 Authorization Bearer)
    location /admin/ {
        proxy_pass http://host.docker.internal:8201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Authorization $http_authorization;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA history 回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
