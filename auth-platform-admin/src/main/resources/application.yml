server:
  port: 8201
  # Casdoor 的 access_token 常达 8-9KB(内嵌完整 user 对象)，超过默认 8KB header 上限会在鉴权前被
  # Tomcat 直接 400。凡接收 Casdoor 用户 token 的服务都须放大此值(接入方同理)。
  # 注意 Spring Boot 3 的属性名是 max-http-request-header-size(2.x 的 max-http-header-size 已失效)。
  max-http-request-header-size: 64KB

spring:
  application:
    name: auth-platform-admin

authz:
  spicedb:
    endpoint: ${SPICEDB_HTTP:http://localhost:8543}
    token: ${SPICEDB_KEY:authz_dev_key}
  security:
    jwk-set-uri: ${CASDOOR_JWKS:http://localhost:8000/.well-known/jwks}
    issuer: ${CASDOOR_ISSUER:http://localhost:8000}
    client-id: ${CASDOOR_CLIENT_ID:}          # aud 校验(= console 的 Casdoor client_id);空则跳过
    webhook-secret: ${AUTHZ_WEBHOOK_SECRET:}  # webhook 共享密钥;空则不校验(仅本地)
  audit:
    # 审计持久化(默认关=内存 500 条,重启即失)。开启需先建库: docker exec authz-postgres createdb -U authz authz_admin
    # (新起的 compose 卷会由 deploy/postgres-init/ 自动建;老卷需手动跑上面一条)。表 authz_audit 启动时幂等自建。
    persistence-enabled: ${AUTHZ_AUDIT_PERSISTENCE_ENABLED:false}
    jdbc-url: ${AUTHZ_AUDIT_JDBC_URL:jdbc:postgresql://localhost:15432/authz_admin}
    username: ${AUTHZ_AUDIT_DB_USER:authz}
    password: ${AUTHZ_AUDIT_DB_PASSWORD:authz_dev_pw}

management:
  endpoints:
    web:
      exposure:
        include: health,info
