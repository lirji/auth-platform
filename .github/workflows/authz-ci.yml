name: Auth Platform CI

on:
  pull_request:
    paths:
      - 'auth-platform-*/**'
      - 'deploy/risk-*.sh'
      - 'pom.xml'
      - 'mvnw'
      - '.mvn/**'
      - '.github/workflows/authz-ci.yml'
  push:
    branches: [main]
    paths:
      - 'auth-platform-*/**'
      - 'deploy/risk-*.sh'
      - 'pom.xml'
      - 'mvnw'
      - '.mvn/**'
      - '.github/workflows/authz-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: authz-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: ./mvnw -B verify
      - name: Validate risk onboarding assets
        run: |
          bash -n deploy/risk-platform-provision.sh deploy/risk-authz-fixture.sh
          grep -q 'definition risk_case' auth-platform-core/src/main/resources/schemas/risk.zed
          grep -q 'permission work = assignee' auth-platform-core/src/main/resources/schemas/risk.zed
