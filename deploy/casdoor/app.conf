appname = casdoor
httpport = 8000
runmode = dev
SessionOn = true
copyrequestbody = true
# Postgres 数据源: 连到 authz-postgres 的默认 spicedb 库引导, Casdoor 自建并使用 dbName=casdoor
driverName = postgres
dataSourceName = "user=authz password=authz_dev_pw host=authz-postgres port=5432 sslmode=disable dbname=spicedb"
dbName = casdoor
tableNamePrefix =
showSql = false
redisEndpoint =
defaultStorageProvider =
isCloudIntranet = false
authState = "casdoor"
socks5Proxy = "127.0.0.1:10808"
verificationCodeTimeout = 10
initScore = 2000
logPostOnly = true
isUsernameLowered = false
origin = "http://localhost:8000"
originFrontend = "http://localhost:8000"
staticBaseUrl = "https://cdn.casbin.org"
isDemoMode = false
batchSize = 100
enableGzip = true
ldapServerPort = 389
radiusServerPort = 1812
radiusSecret = "secret"
quota = {"organization": -1, "user": -1, "application": -1, "provider": -1}
logConfig = {"filename": "logs/casdoor.log", "maxdays":99999, "perm":"0770"}
